name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            asset: graphassist-win64.exe
            pyinstaller_name: graphassist-win64
            dist_path: dist/graphassist-win64.exe
          - os: ubuntu-24.04
            asset: graphassist-linux
            pyinstaller_name: graphassist-linux
            dist_path: dist/graphassist-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev

      - name: Build binary
        shell: bash
        run: |
          uv run pyinstaller --onefile --name "${{ matrix.pyinstaller_name }}" \
            --collect-submodules graphassist \
            src/graphassist/graphassist.py

      - name: Verify binary
        shell: bash
        run: test -f "${{ matrix.dist_path }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.dist_path }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/graphassist-win64.exe
            dist/graphassist-linux
